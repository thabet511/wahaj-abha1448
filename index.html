<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>بطولة وهج الرياضية 🏆</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background-color: #E0F2FE; color: #0F172A; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        header { background-color: #0F172A; color: #ffffff; width: 100%; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); z-index: 10; }
        header .logo-container { width: 80px; height: 80px; display: flex; justify-content: center; align-items: center; }
        header img { max-width: 100%; max-height: 100%; object-fit: contain; }
        header h1 { font-size: 26px; font-weight: 900; text-align: center; flex-grow: 1; letter-spacing: 1px; }
        .slider-wrapper { width: 100%; max-width: 1000px; height: 350px; margin: 20px auto; position: relative; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .slider { width: 100%; height: 100%; position: relative; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; display: flex; justify-content: center; align-items: center; background-color: #f1f5f9; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .tabs-container { display: flex; justify-content: center; gap: 10px; width: 100%; max-width: 1000px; margin-bottom: 25px; padding: 0 10px; }
        .tab-btn { background-color: #0F172A; color: #ffffff; border: none; padding: 15px 30px; font-size: 16px; font-weight: 700; cursor: pointer; flex: 1; text-align: center; transition: all 0.3s; border-radius: 0px; }
        .tab-btn:hover, .tab-btn.active { background-color: #0284c7; color: #ffffff; }
        .content-section { display: none; width: 100%; max-width: 1000px; padding: 0 10px 40px 10px; }
        .content-section.active { display: block; }
        .card { background-color: #ffffff; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .card h2 { font-size: 22px; font-weight: 800; margin-bottom: 20px; border-bottom: 3px solid #0F172A; padding-bottom: 8px; color: #0F172A; }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 15px; margin-bottom: 30px; padding-top: 20px; }
        .podium-column { background-color: #f8fafc; border: 2px solid #e2e8f0; text-align: center; padding: 20px 10px; width: 120px; display: flex; flex-direction: column; align-items: center; }
        .podium-column.first { height: 180px; border-color: #D4AF37; background-color: #fffbeb; }
        .podium-column.second { height: 150px; border-color: #C0C0C0; background-color: #f1f5f9; }
        .podium-column.third { height: 120px; border-color: #CD7F32; background-color: #fff7ed; }
        .badge { width: 40px; height: 40px; border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; margin-bottom: 10px; }
        .badge.gold { background-color: #D4AF37; }
        .badge.silver { background-color: #94a3b8; }
        .badge.bronze { background-color: #b45309; }
        .podium-name { font-weight: bold; font-size: 14px; word-break: break-word; }
        .podium-pts { color: #0284c7; font-weight: 800; margin-top: 5px; }
        .runners-list { list-style: none; width: 100%; max-width: 600px; margin: 0 auto; }
        .runner-item { background-color: #f8fafc; border: 1px solid #e2e8f0; padding: 12px 20px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .runner-rank { background-color: #0F172A; color: white; padding: 2px 10px; font-size: 12px; }
        .sub-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .sub-tab-btn { background-color: #e2e8f0; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; font-size: 14px; flex: 1; border-radius: 0px; }
        .sub-tab-btn.active { background-color: #0F172A; color: white; }
        .table-container { overflow-x: auto; margin-top: 15px; margin-bottom: 25px; }
        .group-title { background-color: #0b1329; color: white; padding: 8px 15px; font-weight: bold; font-size: 16px; text-align: right; }
        table { width: 100%; border-collapse: collapse; text-align: center; background: white; }
        th, td { padding: 12px 10px; border: 1px solid #cbd5e1; font-size: 14px; }
        th { background-color: #0F172A; color: white; font-weight: 700; }
        tr:nth-child(even) { background-color: #f8fafc; }
        .matches-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 15px; }
        .match-card { background-color: #f8fafc; border: 2px solid #cbd5e1; padding: 15px; text-align: center; }
        .match-day { background-color: #0F172A; color: white; font-size: 12px; padding: 3px 10px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        .match-sport-badge { font-size: 11px; color: #0284c7; font-weight: bold; margin-bottom: 5px; }
        .match-versus { font-size: 16px; font-weight: 800; color: #0F172A; margin: 8px 0; display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-container"><img src="images/logo-right.png" alt="الشعار اليمين" /></div>
        <h1>بطولة وهج الرياضية 🏆</h1>
        <div class="logo-container"><img src="images/logo-left.png" alt="الشعار اليسار" /></div>
    </header>
    <div class="slider-wrapper">
        <div class="slider">
            <div class="slide active"><img src="images/slide1.png" alt="صورة العرض الأولى" /></div>
            <div class="slide"><img src="images/slide2.png" alt="صورة العرض الثانية" /></div>
            <div class="slide"><img src="images/slide3.png" alt="صورة العرض الثالثة" /></div>
        </div>
    </div>
    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab(event, 'tab-leaders')">نتائج الأوائل 🥇</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-standings')">ترتيب المجموعات 📊</button>
        <button class="tab-btn" onclick="switchTab(event, 'tab-fixtures')">جدول المباريات 🗓️</button>
    </div>
    <div id="tab-leaders" class="content-section active">
        <div class="card">
            <h2>تصنيف الأوائل (الفردي)</h2>
            <div class="podium">
                <div class="podium-column second">
                    <div class="badge silver">2</div>
                    <div class="podium-name" id="p-second-name">شحن البيانات...</div>
                    <div class="podium-pts" id="p-second-pts">-</div>
                </div>
                <div class="podium-column first">
                    <div class="badge gold">1</div>
                    <div class="podium-name" id="p-first-name">شحن البيانات...</div>
                    <div class="podium-pts" id="p-first-pts">-</div>
                </div>
                <div class="podium-column third">
                    <div class="badge bronze">3</div>
                    <div class="podium-name" id="p-third-name">شحن البيانات...</div>
                    <div class="podium-pts" id="p-third-pts">-</div>
                </div>
            </div>
            <ul class="runners-list" id="runners-list-ul"></ul>
        </div>
    </div>
    <div id="tab-standings" class="content-section">
        <div class="card">
            <h2>ترتيب مجموعات الفرق الرياضية</h2>
            <div class="sub-tabs">
                <button class="sub-tab-btn active" onclick="switchSport(event, 'football-container')">كرة القدم ⚽</button>
                <button class="sub-tab-btn" onclick="switchSport(event, 'volley-container')">كرة الطائرة 🏐</button>
            </div>
            <div id="football-container" style="display: block;"></div>
            <div id="volley-container" style="display: none;"></div>
        </div>
    </div>
    <div id="tab-fixtures" class="content-section">
        <div class="card">
            <h2>جدول مواعيد مباريات البطولة</h2>
            <div class="matches-grid" id="matches-grid-container"></div>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDummyKey_wahaj48abha",
            authDomain: "wahaj-48abha.firebaseapp.com",
            projectId: "wahaj-48abha",
            storageBucket: "wahaj-48abha.appspot.com",
            messagingSenderId: "796567778899",
            appId: "1:796567778899:web:321654987"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let slideIndex = 0;
        const slides = document.querySelectorAll(".slide");
        function runSlider() {
            slides.forEach(slide => slide.classList.remove("active"));
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1; }
            slides[slideIndex - 1].classList.add("active");
            setTimeout(runSlider, 3000);
        }
        runSlider();
        function switchTab(evt, tabId) {
            const sections = document.querySelectorAll(".content-section");
            sections.forEach(sec => sec.classList.remove("active"));
            const tabButtons = document.querySelectorAll(".tab-btn");
            tabButtons.forEach(btn => btn.classList.remove("active"));
            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
        function switchSport(evt, tableId) {
            document.getElementById("football-container").style.display = "none";
            document.getElementById("volley-container").style.display = "none";
            const subBtns = document.querySelectorAll(".sub-tab-btn");
            subBtns.forEach(btn => btn.classList.remove("active"));
            document.getElementById(tableId).style.display = "block";
            evt.currentTarget.classList.add("active");
        }
        db.collection("students").orderBy("points", "desc").onSnapshot(snapshot => {
            const students = [];
            snapshot.forEach(doc => { students.push(doc.data()); });
            document.getElementById("p-first-name").innerText = students[0] ? students[0].name : "لا يوجد";
            document.getElementById("p-first-pts").innerText = students[0] ? (students[0].points + ' نقطة') : "-";
            document.getElementById("p-second-name").innerText = students[1] ? students[1].name : "لا يوجد";
            document.getElementById("p-second-pts").innerText = students[1] ? (students[1].points + ' نقطة') : "-";
            document.getElementById("p-third-name").innerText = students[2] ? students[2].name : "لا يوجد";
            document.getElementById("p-third-pts").innerText = students[2] ? (students[2].points + ' نقطة') : "-";
            const runnersUl = document.getElementById("runners-list-ul");
            runnersUl.innerHTML = "";
            const nextSeven = students.slice(3, 10);
            nextSeven.forEach((student, index) => {
                const li = document.createElement("li");
                li.className = "runner-item";
                li.innerHTML = '<div><span class="runner-rank">المركز ' + (index + 4) + '</span><span style="margin-right:10px;">' + student.name + '</span></div><span style="color:#0284c7; font-weight:800;">' + student.points + ' نقطة</span>';
                runnersUl.appendChild(li);
            });
        });
        db.collection("groups").onSnapshot(groupSnap => {
            const groupsList = [];
            groupSnap.forEach(gDoc => { groupsList.push(gDoc.data().name); });
            db.collection("football_standings").onSnapshot(fbSnap => {
                const fbTeams = [];
                fbSnap.forEach(doc => { fbTeams.push(doc.data()); });
                const fContainer = document.getElementById("football-container");
                fContainer.innerHTML = "";
                groupsList.forEach(grpName => {
                    const grpTeams = fbTeams.filter(t => t.groupName === grpName).sort((a,b) => b.points - a.points);
                    if (grpTeams.length > 0) {
                        const grpDiv = document.createElement("div");
                        grpDiv.className = "table-container";
                        let tableHTML = '<div class="group-title">' + grpName + '</div><table><thead><tr><th>الترتيب</th><th>الفريق</th><th>لعب</th><th>النقاط</th><th>التعادل</th><th>له</th><th>عليه</th><th>كروت صفراء 🟨</th><th>كروت حمراء 🟥</th></tr></thead><tbody>';
                        let r = 1;
                        grpTeams.forEach(t => {
                            tableHTML += '<tr><td style="font-weight:bold; color:#0284c7;">' + (r++) + '</td><td style="font-weight:bold;">' + t.teamName + '</td><td>' + t.played + '</td><td style="font-weight:bold; background-color:#f0f9ff;">' + t.points + '</td><td>' + t.draws + '</td><td>' + t.gf + '</td><td>' + t.ga + '</td><td><span style="background:#fef08a; padding:2px 8px;">' + t.yellow + '</span></td><td><span style="background:#fecaca; padding:2px 8px;">' + t.red + '</span></td></tr>';
                        });
                        tableHTML += '</tbody></table>';
                        grpDiv.innerHTML = tableHTML;
                        fContainer.appendChild(grpDiv);
                    }
                });
            });
            db.collection("volley_standings").onSnapshot(vlSnap => {
                const vlTeams = [];
                vlSnap.forEach(doc => { vlTeams.push(doc.data()); });
                const vContainer = document.getElementById("volley-container");
                vContainer.innerHTML = "";
                groupsList.forEach(grpName => {
                    const grpTeams = vlTeams.filter(t => t.groupName === grpName).sort((a,b) => b.points - a.points);
                    if (grpTeams.length > 0) {
                        const grpDiv = document.createElement("div");
                        grpDiv.className = "table-container";
                        let tableHTML = '<div class="group-title">' + grpName + '</div><table><thead><tr><th>الترتيب</th><th>الفريق</th><th>لعب</th><th>النقاط</th><th>له</th><th>عليه</th></tr></thead><tbody>';
                        let r = 1;
                        grpTeams.forEach(t => {
                            tableHTML += '<tr><td style="font-weight:bold; color:#0284c7;">' + (r++) + '</td><td style="font-weight:bold;">' + t.teamName + '</td><td>' + t.played + '</td><td style="font-weight:bold; background-color:#f0f9ff;">' + t.points + '</td><td>' + t.gf + '</td><td>' + t.ga + '</td></tr>';
                        });
                        tableHTML += '</tbody></table>';
                        grpDiv.innerHTML = tableHTML;
                        vContainer.appendChild(grpDiv);
                    }
                });
            });
        });
        db.collection("matches").onSnapshot(snapshot => {
            const grid = document.getElementById("matches-grid-container");
            grid.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const div = document.createElement("div");
                div.className = "match-card";
                div.innerHTML = '<span class="match-day">' + data.day + '</span><div class="match-sport-badge">' + (data.sport === "قدم" ? "⚽ كرة قدم" : "🏐 كرة طائرة") + '</div><div class="match-versus"><span>' + data.team1 + '</span><span style="color:#0284c7; font-size:14px;">ضد</span><span>' + data.team2 + '</span></div>';
                grid.appendChild(div);
            });
        });
    </script>
</body>
</html>
